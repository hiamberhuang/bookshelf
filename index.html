  who:"Nabeel Hyatt（Spark Capital）× Fraser Kelton（前 OpenAI 产品负责人）",
  url:"",
  why:"硅谷一线视角的 AI 产品与投资漫谈，节奏像真的在走廊聊天——没有稿子，全是判断。中文 AI 博主圈的高频信源之一，很多“国内还没聊起来”的话题这里先出现。",
  eps:"配套英文信源：<b>The Rundown AI</b>（每日 newsletter 快讯扫盲）· <b>Every</b>（深度科技写作）。均需网络条件允许。",
  books:[],
  quote:""},
];

/* ───────── 状态 ───────── */
const ST=["待读","在读","读完"], BC=["","b1","b2"], SC=["","s1","s2"];
const store=k=>localStorage.getItem("bs_"+k)||"0";
const setSt=(k,v)=>localStorage.setItem("bs_"+k,v);
let filter=-1, curBook=null;

const stars=n=>"★".repeat(n);

/* ───────── 渲染 ───────── */
function renderBooks(){
  document.getElementById("brow").innerHTML = BOOKS.map((b,i)=>{
    const s=+store(b.id);
    const dim=(filter>=0&&s!==filter)?" dim":"";
    return `<div class="bcard${dim}" onclick="openB(${i})">
      <div class="cover" style="background:${b.cover.bg};color:${b.cover.fg}">
        <div class="badge ${BC[s]}">${ST[s]}</div>
        <div class="frame"></div>
        <div class="orn">${b.cover.orn}</div>
        <div class="ct serif">${b.t}</div>
        ${b.en?`<div class="cen">${b.en}</div>`:""}
        <div class="ca">${b.a}</div>
      </div>
      <div class="binfo">
        <div class="t"><span>${b.t}</span><span class="pri">${stars(b.pri)}</span></div>
        <div class="a">${b.a} · ${b.tag}</div>
        <div class="s">${b.src}</div>
      </div>
    </div>`;
  }).join("");
  renderPills();
}
function renderPills(){
  const cnt=[0,0,0]; BOOKS.forEach(b=>cnt[+store(b.id)]++);
  const mk=(l,i,n)=>`<div class="pill${filter===i?" on":""}" onclick="flt(${i})">${l}<b>${n}</b></div>`;
  document.getElementById("pills").innerHTML =
    mk("全部",-1,BOOKS.length)+mk("待读",0,cnt[0])+mk("在读",1,cnt[1])+mk("读完",2,cnt[2]);
}
function renderPods(){
  document.getElementById("prow").innerHTML = PODS.map((p,i)=>`
    <div class="pcard" onclick="openP(${i})">
      <div class="ptile" style="background:${p.bg}">
        <div class="ptag">${p.tag}</div>
        <div class="big">${p.big}</div>
        <div class="pn">${p.name}</div>
      </div>
      <div class="pinfo">
        <div class="w">${p.who}</div>
        <div class="d">${p.why}</div>
        ${p.books.length?`<div class="chips">${p.books.map(b=>`<span class="chip">📖 ${b}</span>`).join("")}</div>`:""}
      </div>
    </div>`).join("");
}

/* ───────── 交互 ───────── */
function flt(i){ filter=(filter===i?-1:i); renderBooks(); }
function scr(id,dir){ document.getElementById(id).scrollBy({left:dir*560,behavior:"smooth"}); }

function openB(i){
  curBook=i; const b=BOOKS[i], s=+store(b.id);
  document.getElementById("sheet").innerHTML=`
    <button class="x" onclick="closeM()">✕</button>
    <div class="m-kick">书 · ${b.tag} · 优先级 ${stars(b.pri)}</div>
    <div class="m-title serif">《${b.t}》</div>
    <div class="m-sub">${b.a}${b.en?` · ${b.en}`:""}</div>
    <div class="m-body">${b.blurb}</div>
    <div class="m-meta">
      <div class="m-src">出处：<b>${b.src}</b></div>
      <button class="stbtn ${SC[s]}" onclick="cyc()">${ST[s]} · 点击切换</button>
    </div>`;
  showM();
}
function cyc(){
  const b=BOOKS[curBook]; setSt(b.id,(+store(b.id)+1)%3);
  openB(curBook); renderBooks();
}
function openP(i){
  const p=PODS[i];
  document.getElementById("sheet").innerHTML=`
    <button class="x" onclick="closeM()">✕</button>
    <div class="m-kick">播客 · ${p.tag}</div>
    <div class="m-title">${p.name}</div>
    <div class="m-sub">${p.who}</div>
    <div class="m-body">${p.why}</div>
    <div class="m-eps">${p.eps}</div>
    ${p.books.length?`<div class="chips" style="margin-top:12px">${p.books.map(b=>`<span class="chip">📖 ${b}</span>`).join("")}</div>`:""}
    ${p.quote?`<div class="m-quote">${p.quote}</div>`:""}
    ${p.url?`<a class="gobtn" href="${p.url}" target="_blank">去收听 →</a>`:""}`;
  showM();
}
function showM(){ document.getElementById("ovl").classList.add("show"); document.body.style.overflow="hidden"; }
function closeM(){ document.getElementById("ovl").classList.remove("show"); document.body.style.overflow=""; }
document.addEventListener("keydown",e=>{ if(e.key==="Escape")closeM(); });

renderBooks(); renderPods();
</script>
</body>
</html>
