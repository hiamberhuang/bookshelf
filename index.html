<style>
  :root{
    --ink:#222222; --gray:#717171; --line:#ebebeb; --bg:#ffffff;
    --brand:#FF385C; --green:#008a05; --gold:#c58a00;
    --shadow:0 6px 16px rgba(0,0,0,.12);
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased}
  .serif{font-family:"Songti SC","STSong",Georgia,serif}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px}

  /* ── top bar ── */
  .topbar{position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);z-index:50}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:64px}
  .logo{font-weight:800;font-size:18px;color:var(--brand);display:flex;align-items:center;gap:8px}
  .logo span{color:var(--ink)}
  .top-note{font-size:12.5px;color:var(--gray)}

  /* ── hero ── */
  .hero{padding:40px 0 8px}
  .hero h1{font-size:clamp(26px,4.5vw,34px);font-weight:800;letter-spacing:-.01em}
  .hero p{color:var(--gray);font-size:15px;margin-top:8px;max-width:660px}
  .hero p em{font-style:normal;color:var(--ink);font-weight:600}

  /* ── section ── */
  section{padding:28px 0 6px}
  .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .sec-head h2{font-size:22px;font-weight:800;letter-spacing:-.01em}
  .sec-head .sub{font-size:13px;color:var(--gray);margin-top:2px}
  .arrows{display:flex;gap:8px}
  .arrow{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:#fff;
    cursor:pointer;font-size:15px;color:var(--ink);display:flex;align-items:center;justify-content:center;
    transition:.15s;user-select:none}
  .arrow:hover{box-shadow:var(--shadow);transform:scale(1.05)}
  @media(max-width:740px){.arrows{display:none}}

  /* ── filter pills ── */
  .pills{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 18px}
  .pill{font-size:13px;padding:7px 16px;border:1px solid var(--line);border-radius:999px;background:#fff;
    cursor:pointer;color:var(--ink);user-select:none;transition:.15s;font-weight:500}
  .pill:hover{border-color:var(--ink)}
  .pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .pill b{font-weight:700;opacity:.7;margin-left:3px}

  /* ── scroll row ── */
  .row{display:flex;gap:18px;overflow-x:auto;scroll-snap-type:x mandatory;
    padding:6px 2px 26px;scrollbar-width:none}
  .row::-webkit-scrollbar{display:none}

  /* ── book card ── */
  .bcard{flex:0 0 172px;min-width:0;width:172px;scroll-snap-align:start;cursor:pointer;transition:.18s;position:relative}
  .bcard:hover{transform:translateY(-3px)}
  .bcard.dim{opacity:.3}
  .cover{aspect-ratio:2/3;border-radius:12px;overflow:hidden;position:relative;
    box-shadow:0 2px 10px rgba(0,0,0,.14);background:#f0ede6;transition:.18s}
  .bcard:hover .cover{box-shadow:var(--shadow)}
  .cover img{width:100%;height:100%;object-fit:cover;display:block}
  .badge{position:absolute;top:10px;left:10px;font-size:11px;font-weight:700;padding:3px 10px;
    border-radius:999px;background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.18);z-index:2}
  .badge.b1{background:var(--brand);color:#fff}
  .badge.b2{background:var(--green);color:#fff}
  .binfo{padding:10px 2px 0}
  .binfo .t{font-size:14.5px;font-weight:700;line-height:1.4;display:flex;justify-content:space-between;gap:6px}
  .binfo .t .pri{color:var(--ink);font-size:12px;white-space:nowrap;font-weight:600}
  .binfo .a{font-size:12.5px;color:var(--gray);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .binfo .s{font-size:12px;color:var(--gray);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ── podcast card ── */
  .pcard{flex:0 0 320px;min-width:0;width:320px;scroll-snap-align:start;cursor:pointer;transition:.18s}
  .pcard:hover{transform:translateY(-3px)}
  .ptile{aspect-ratio:16/9;border-radius:var(--radius);position:relative;overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.12);display:flex;align-items:flex-end;padding:16px;transition:.18s}
  .pcard:hover .ptile{box-shadow:var(--shadow)}
  .ptile .bgimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .ptile .shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.06) 30%,rgba(0,0,0,.62))}
  .ptile .big{position:absolute;right:-6px;top:-18px;font-size:110px;font-weight:900;opacity:.14;
    font-family:"Songti SC","STSong",Georgia,serif;line-height:1;pointer-events:none;color:#fff}
  .ptile .pn{color:#fff;font-weight:800;font-size:17px;line-height:1.35;text-shadow:0 1px 6px rgba(0,0,0,.35);position:relative}
  .ptag{position:absolute;top:12px;left:12px;font-size:11px;font-weight:700;background:rgba(255,255,255,.92);
    color:var(--ink);padding:3px 10px;border-radius:999px;z-index:2}
  .pinfo{padding:12px 2px 0}
  .pinfo .w{font-size:12.5px;color:var(--gray);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pinfo .d{font-size:13.5px;color:var(--ink);margin-top:4px;display:-webkit-box;
    -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .chip{font-size:11px;background:#f7f7f7;border:1px solid var(--line);border-radius:999px;padding:2px 9px;color:var(--gray)}

  /* ── modal ── */
  .ovl{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;
    align-items:flex-end;justify-content:center}
  .ovl.show{display:flex}
  @media(min-width:640px){.ovl.show{align-items:center}}
  .sheet{background:#fff;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;
    border-radius:20px 20px 0 0;padding:26px 26px 30px;position:relative;animation:up .22s ease}
  @media(min-width:640px){.sheet{border-radius:20px}}
  @keyframes up{from{transform:translateY(28px);opacity:.6}to{transform:none;opacity:1}}
  .x{position:absolute;top:14px;right:16px;width:32px;height:32px;border-radius:50%;border:none;
    background:#f2f2f2;font-size:15px;cursor:pointer;color:var(--ink)}
  .m-kick{font-size:11.5px;letter-spacing:.12em;color:var(--brand);font-weight:700;text-transform:uppercase}
  .m-title{font-size:22px;font-weight:800;margin:6px 0 2px;line-height:1.35}
  .m-sub{font-size:13.5px;color:var(--gray);margin-bottom:14px}
  .m-body{font-size:14.5px;color:var(--ink)}
  .m-body .warn{color:var(--brand);font-size:13.5px}
  .m-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
    border-top:1px solid var(--line);margin-top:16px;padding-top:14px}
  .m-src{font-size:13px;color:var(--gray)}
  .m-src a{color:var(--ink);font-weight:700;text-decoration:underline;text-underline-offset:3px}
  .m-src b{color:var(--ink)}
  .mst{font-size:12.5px;font-weight:700;padding:5px 14px;border-radius:999px;background:#f2f2f2;color:var(--gray)}
  .mst.s1{background:var(--brand);color:#fff}
  .mst.s2{background:var(--green);color:#fff}
  .gobtn{display:inline-block;margin-top:16px;margin-right:10px;font-size:14px;font-weight:700;padding:11px 22px;border-radius:10px;
    background:var(--brand);color:#fff;text-decoration:none}
  .gobtn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--ink)}
  .m-quote{font-size:13.5px;color:var(--gray);border-left:3px solid var(--gold);padding-left:12px;margin-top:14px;font-style:italic}
  .m-eps{font-size:13.5px;color:var(--gray);margin-top:12px}
  .m-eps b{color:var(--ink)}

  footer{border-top:1px solid var(--line);margin-top:36px;padding:22px 0 48px;
    font-size:12.5px;color:var(--gray)}
  footer a{color:var(--ink);font-weight:600;text-decoration:none}
</style>
</head>

/* ───────── 渲染 ───────── */
const ST=["待读","在读","读完"], BC=["","b1","b2"], SC=["","s1","s2"];
let filter=-1;
const stars=n=>n?"★".repeat(n):"";

function renderBooks(){
  document.getElementById("brow").innerHTML = BOOKS.map((b,i)=>{
    if(filter>=0 && b.st!==filter) return "";
    return `<div class="bcard" onclick="openB(${i})">
      <div class="cover">
        <div class="badge ${BC[b.st]}">${ST[b.st]}</div>
        <img src="${b.img}" alt="《${b.t}》封面" loading="lazy" onerror="this.style.display='none'">
      </div>
      <div class="binfo">
        <div class="t"><span>${b.t}</span>${b.pri?`<span class="pri">${stars(b.pri)}</span>`:""}</div>
        <div class="a">${b.a} · ${b.tag}</div>
        <div class="s">${b.src}</div>
      </div>
    </div>`;
  }).join("");
  renderPills();
}
function renderPills(){
  const cnt=[0,0,0]; BOOKS.forEach(b=>cnt[b.st]++);
  const mk=(l,i,n)=>`<div class="pill${filter===i?" on":""}" onclick="flt(${i})">${l}<b>${n}</b></div>`;
  document.getElementById("pills").innerHTML =
    mk("全部",-1,BOOKS.length)+mk("在读",1,cnt[1])+mk("待读",0,cnt[0])+mk("读完",2,cnt[2]);
}
function podCard(p,list,i){
  return `<div class="pcard" onclick="openP('${list}',${i})">
      <div class="ptile" style="background:${p.bg}">
        ${p.img?`<img class="bgimg" src="${p.img}" alt="" loading="lazy" onerror="this.remove()"><div class="shade"></div>`:`<div class="big">${p.big}</div>`}
        <div class="ptag">${p.tag}</div>
        <div class="pn">${p.name}</div>
      </div>
      <div class="pinfo">
        <div class="w">${p.who}</div>
        <div class="d">${p.why}</div>
        ${p.books.length?`<div class="chips">${p.books.map(b=>`<span class="chip">📖 ${b}</span>`).join("")}</div>`:""}
      </div>
    </div>`;
}
function renderPods(){
  document.getElementById("prow").innerHTML = SERIES.map((p,i)=>podCard(p,'s',i)).join("");
  document.getElementById("erow").innerHTML = EPISODES.map((p,i)=>podCard(p,'e',i)).join("");
}

/* ───────── 交互 ───────── */
function flt(i){ filter=(filter===i?-1:i); renderBooks(); }
function scr(id,dir){ document.getElementById(id).scrollBy({left:dir*560,behavior:"smooth"}); }

function openB(i){
  const b=BOOKS[i];
  const srcLine = b.srcUrl
    ? `出处：<a href="${b.srcUrl}" target="_blank">${b.src} ↗</a>`
    : `出处：<b>${b.src}</b>`;
  document.getElementById("sheet").innerHTML=`
    <button class="x" onclick="closeM()">✕</button>
    <div class="m-kick">书 · ${b.tag}${b.pri?` · 优先级 ${stars(b.pri)}`:""}</div>
    <div class="m-title serif">《${b.t}》</div>
    <div class="m-sub">${b.a}${b.en?` · ${b.en}`:""}</div>
    <div class="m-body">${b.blurb}</div>
    <div class="m-meta">
      <div class="m-src">${srcLine}</div>
      <div class="mst ${SC[b.st]}">${ST[b.st]}</div>
    </div>
    <a class="gobtn ghost" href="${b.douban}" target="_blank">豆瓣详情 →</a>${b.srcUrl?`<a class="gobtn" href="${b.srcUrl}" target="_blank">去看这期 →</a>`:""}`;
  showM();
}
function openP(list,i){
  const p=(list==='s'?SERIES:EPISODES)[i];
  document.getElementById("sheet").innerHTML=`
    <button class="x" onclick="closeM()">✕</button>
    <div class="m-kick">播客 · ${p.tag}</div>
    <div class="m-title">${p.name}</div>
    <div class="m-sub">${p.who}</div>
    <div class="m-body">${p.why}</div>
    <div class="m-eps">${p.eps}</div>
    ${p.books.length?`<div class="chips" style="margin-top:12px">${p.books.map(b=>`<span class="chip">📖 ${b}</span>`).join("")}</div>`:""}
    ${p.quote?`<div class="m-quote">${p.quote}</div>`:""}
    ${p.url?`<a class="gobtn" href="${p.url}" target="_blank">去收听 →</a>`:""}`;
  showM();
}
function showM(){ document.getElementById("ovl").classList.add("show"); document.body.style.overflow="hidden"; }
function closeM(){ document.getElementById("ovl").classList.remove("show"); document.body.style.overflow=""; }
document.addEventListener("keydown",e=>{ if(e.key==="Escape")closeM(); });

renderBooks(); renderPods();
</script>
